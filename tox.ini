[tox]
envlist = py310, py311, py312, lint, type-check
skip_missing_interpreters = true
isolated_build = true

[testenv]
description = Run pytest on the test suite
deps =
    pytest>=7.4
    pytest-cov
    pytest-xdist
commands = 
    pytest tests/ {posargs} --cov=src/base_attentive --cov-report=html --cov-report=term

[testenv:tensorflow]
description = Run tests with TensorFlow backend
deps =
    {[testenv]deps}
    tensorflow>=2.15.0
setenv =
    KERAS_BACKEND = tensorflow
    BASE_ATTENTIVE_BACKEND = tensorflow
commands = 
    pytest tests/ {posargs} -m "not pytorch" -v

[testenv:lint]
description = Run linting checks
deps =
    ruff
commands =
    ruff check src/ tests/
    ruff format --check src/ tests/

[testenv:type-check]
description = Run type checking with mypy
deps =
    mypy
    types-setuptools
commands = 
    mypy src/base_attentive --ignore-missing-imports

[testenv:format]
description = Format code with Ruff
deps =
    ruff
commands =
    ruff check --fix src/ tests/
    ruff format src/ tests/

[testenv:docs]
description = Build documentation with sphinx
deps =
    sphinx
    sphinx-rtd-theme
    sphinx-autodoc-typehints
commands =
    sphinx-build -W -b html -d docs/_build/doctrees docs docs/_build/html

[gh-actions]
python =
    3.10: py310
    3.11: py311
    3.12: py312

[coverage:run]
source = src/base_attentive
omit =
    */tests/*
    */site-packages/*
