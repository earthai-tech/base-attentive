[pytest]
# Pytest configuration for base-attentive

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --timeout=120

# Coverage options
testpaths = tests

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    tensorflow: Tests requiring TensorFlow
    pytorch: Tests requiring PyTorch
    slow: Slow running tests

# Logging
# log_cli intentionally kept off — TF emits thousands of DEBUG messages that
# flood the runner's disk and make tests appear frozen on Linux / macOS CI.
log_cli = false
log_file = tests.log
log_file_level = WARNING
