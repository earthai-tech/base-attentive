[pytest]
# Pytest configuration for base-attentive

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Coverage options
testpaths = tests

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    tensorflow: Tests requiring TensorFlow
    pytorch: Tests requiring PyTorch
    slow: Slow running tests

# Logging
log_cli = true
log_cli_level = INFO
log_file = tests.log
log_file_level = DEBUG
